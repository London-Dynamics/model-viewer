<!DOCTYPE html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; LD Material Manager</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="&lt;model-viewer&gt; LD Material Manager examples"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link type="text/css" href="../../styles/examples.css" rel="stylesheet" />
    <link type="text/css" href="../../styles/docs.css" rel="stylesheet" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="../../assets/favicon.png"
    />

    <!-- ES-Shims for older browsers -->
    <script
      async
      src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"
    ></script>

    <!-- Import Three.js using an import-map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@^0.172.0/build/three.module.min.js"
        }
      }
    </script>

    <!-- Loads <model-viewer> on modern browsers: -->
    <!-- Import the <model-viewer> component without three bundled -->

    <script
      type="module"
      src="../../../../node_modules/@london-dynamics/model-viewer/dist/model-viewer-module.js"
    ></script>

    <!-- Import the <model-viewer-effects> addon -->
    <script
      type="module"
      src="../../../../node_modules/@google/model-viewer-effects/dist/model-viewer-effects.js"
    ></script>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      type="text/css"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/fontawesome.min.css"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/solid.min.css"
    />
  </head>
  <body class="ld">
    <div class="examples-page">
      <div class="sidebar" id="sidenav"></div>
      <div id="toggle"></div>
      <div class="examples-container">
        <div class="sample">
          <div id="set-material" class="demo"></div>
          <div class="content">
            <div class="wrapper">
              <h4 id="intro">
                <span class="font-medium">LD Material Manager</span> by
                <a href="https://londondynamics.com" target="_blank"
                  >London Dynamics</a
                >. This page showcases how to update materials on the.
              </h4>

              <div class="heading">
                <h2 class="demo-title">Set Materials</h2>
                <h4>
                  <span class="attribute">setMaterial()</span> – updates the
                  material of the model.
                </h4>
              </div>
              <example-snippet stamp-to="set-material" highlight-as="html">
                <template>
                  <model-viewer
                    src="../../shared-assets/models/RocketShip.glb"
                    id="set-material-demo"
                    ld-puzzler
                    camera-controls
                    interaction-prompt="none"
                    autoplay
                    ar
                    ar-modes="webxr scene-viewer"
                    shadow-intensity="1"
                    max-field-of-view="180"
                    field-of-view="10deg"
                    environment-image="../../shared-assets/environments/lebombo_1k.hdr"
                    floating-controls-enabled
                  >
                    <div class="absolute bottom-0 inset-x-0 p-2">
                      <div class="bg-white shadow-sm rounded-lg">
                        <div class="px-4 py-5">
                          <h3
                            class="text-base! m-0! font-normal! text-gray-400"
                          >
                            Control Panel
                          </h3>
                          <div
                            class="mt-3 divide-y *:py-3 -my-3 divide-gray-100"
                          >
                            <div class="flex gap-4">
                              <div class="flex items-center">
                                <button
                                  id="reset-before-apply"
                                  type="button"
                                  class="group relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-gray-200 aria-checked:bg-blue-600 transition-colors duration-200 ease-in-out focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:outline-hidden"
                                  role="switch"
                                  aria-checked="false"
                                  aria-labelledby="reset-before-apply-label"
                                >
                                  <span
                                    aria-hidden="true"
                                    class="pointer-events-none inline-block size-5 translate-x-0 group-aria-checked:translate-x-5 transform rounded-full bg-white shadow-sm ring-0 transition duration-200 ease-in-out"
                                  ></span>
                                </button>
                                <span
                                  class="ml-2 text-sm text-gray-900"
                                  id="reset-before-apply-label"
                                >
                                  <span class="font-medium"
                                    >Reset before apply</span
                                  >
                                  <span class="text-gray-500 italic"
                                    >(Off by default)</span
                                  >
                                </span>
                              </div>
                            </div>
                            <div class="flex gap-4">
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat21"
                                data-properties='{
                                  "baseColorFactor": [1,1,1,1]
                                }'
                              >
                                Body White
                              </button>
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat21"
                                data-properties='{
                                  "baseColorFactor": [0.91, 0.05, 0.03, 1]
                                }'
                              >
                                Body Red
                              </button>
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat21"
                                data-properties='{
                                  "baseColorFactor": [0.729, 0.533, 0.039, 1],
                                  "metallicFactor": 1,
                                  "roughnessFactor": 0.2
                                }'
                              >
                                Body Gold
                              </button>
                            </div>
                            <div class="flex gap-4">
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat8"
                                data-properties='{
                                  "baseColorFactor": [0.91, 0.05, 0.03, 1],
                                  "metallicFactor": 1,
                                  "roughnessFactor": 0.41
                                }'
                              >
                                Accent Red
                              </button>
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat8"
                                data-properties='{
                                  "baseColorFactor": [1, 1, 1, 1],
                                  "metallicFactor": 0.58,
                                  "roughnessFactor": 0.51
                                }'
                              >
                                Accent White
                              </button>
                              <button
                                type="button"
                                class="set-material rounded bg-white px-2 py-1 text-xs font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50"
                                data-material="mat8"
                                data-properties='{
                                  "baseColorFactor": [0.729, 0.533, 0.039, 1],
                                  "metallicFactor": 1,
                                  "roughnessFactor": 0.2
                                }'
                              >
                                Accent Gold
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </model-viewer>

                  <script type="module">
                    (() => {
                      const modelViewer =
                        document.getElementById('set-material-demo');

                      let resetBeforeApply = false;

                      document
                        .querySelectorAll('.set-material')
                        .forEach((button) => {
                          button.addEventListener('click', (e) => {
                            const materialName = e.target.dataset.material;
                            const properties = JSON.parse(
                              e.target.dataset.properties
                            );

                            modelViewer.setMaterial(
                              materialName,
                              properties,
                              resetBeforeApply
                            );
                          });
                        });

                      document
                        .getElementById('reset-before-apply')
                        .addEventListener('click', (e) => {
                          const el = e.target;
                          if (el.getAttribute('aria-checked') === 'true') {
                            el.setAttribute('aria-checked', 'false');
                            resetBeforeApply = false;
                          } else {
                            el.setAttribute('aria-checked', 'true');
                            resetBeforeApply = true;
                          }
                        });
                    })();
                  </script>
                </template>
              </example-snippet>
            </div>
          </div>
        </div>

        <div class="footer">
          <ul></ul>
          <div style="margin-top: 24px" class="copyright">
            ©Copyright 2019 Google Inc. Licensed under the Apache License 2.0.
          </div>
          <div id="footer-links"></div>
        </div>
      </div>
    </div>

    <script
      type="module"
      src="../../examples/built/docs-and-examples.js"
    ></script>
    <script type="module">
      (() => {
        init('examples-ld-material-manager');
      })();
      (() => {
        initFooterLinks();
      })();
    </script>

    <!-- Documentation-specific dependencies: -->
    <script type="module" src="../built/dependencies.js"></script>
  </body>
</html>
