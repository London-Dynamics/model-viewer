name: Release Package

on:
  release:
    types: [created]

defaults:
  run:
    working-directory: packages/model-viewer

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      LONDON_DYNAMICS_NPM_AUTH_TOKEN: ${{ secrets.LONDON_DYNAMICS_NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v3

      # Install Node (no registry override here). We'll configure a per-scope
      # auth entry in ~/.npmrc so installs for @london-dynamics come from
      # GitHub Packages while other packages continue to use the default
      # registry (npmjs.org).
      - uses: actions/setup-node@v3
        with:
          node-version: 20.15.0

      - name: Configure GitHub Packages auth for @london-dynamics
        run: |
          echo "@london-dynamics:registry=https://npm.pkg.github.com/" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${LONDON_DYNAMICS_NPM_AUTH_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci

      # Reconfigure setup-node so publishing uses GitHub Packages (if you
      # publish there). Publishing still uses the GITHUB_TOKEN for auth.
      - uses: actions/setup-node@v3
        with:
          node-version: 20.15.0
          registry-url: https://npm.pkg.github.com/
          scope: '@london-dynamics'

      - name: Publish package
        run: npm publish
