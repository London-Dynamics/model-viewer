name: Release Package

on:
  release:
    types: [created]

defaults:
  run:
    working-directory: packages/model-viewer

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      # Use the public npm registry for installs so scoped public packages
      # (for example @london-dynamics/types) are fetched from registry.npmjs.org
      - uses: actions/setup-node@v3
        with:
          node-version: 20.15.0
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      # Reconfigure to GitHub Packages only for publishing (if you publish there).
      # This keeps installs pulling from the public npm registry while still
      # allowing a publish to npm.pkg.github.com using the GITHUB_TOKEN.
      - uses: actions/setup-node@v3
        with:
          node-version: 20.15.0
          registry-url: https://npm.pkg.github.com/
          scope: '@london-dynamics'

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}