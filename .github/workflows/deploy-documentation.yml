name: Deploy documentation

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  deploy_github_pages:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: read

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: actions/setup-node@v4
      with:
        registry-url: https://npm.pkg.github.com/
        scope: '@london-dynamics'

    - name: NPM install
      run: npm ci
      env:
        LONDON_DYNAMICS_NPM_AUTH_TOKEN: ${{ secrets.LONDON_DYNAMICS_NPM_AUTH_TOKEN }}

    # - name: Lint TypeScript sources
    #   run: npm run lint

    - name: Build packages
      run: npm run build

    - name: Stage documentation artifacts
      run: ./packages/modelviewer.dev/scripts/ci-before-deploy.sh

    - name: Deploy to Github Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        force_orphan: true
        publish_dir: ./packages/modelviewer.dev/dist
