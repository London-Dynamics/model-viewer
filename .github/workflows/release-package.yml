name: Release Package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@london-dynamics'

      - name: Validate tag matches package.json version
        working-directory: packages/model-viewer
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci
        env:
          LONDON_DYNAMICS_NPM_AUTH_TOKEN: ${{ secrets.LONDON_DYNAMICS_NPM_AUTH_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build package
        run: npm run build --workspace=packages/model-viewer

      - name: Test package
        run: npm run test:ci --workspace=packages/model-viewer

      - name: Dry-run publish
        working-directory: packages/model-viewer
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        working-directory: packages/model-viewer
        run: rm -f .npmrc ../../.npmrc && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
