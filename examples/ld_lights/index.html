<!DOCTYPE html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; LD Lights</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="&lt;model-viewer&gt; LD Lights examples"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link type="text/css" href="../../styles/examples.css" rel="stylesheet" />
    <link type="text/css" href="../../styles/docs.css" rel="stylesheet" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="../../assets/favicon.png"
    />

    <style type="text/tailwindcss"></style>
    <script src="../../styles/ld-ui-loader.js" data-href="../../styles/ld-ui.css"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body class="ld">
    <div class="examples-page">
      <div class="sidebar" id="sidenav"></div>
      <div id="toggle"></div>
      <div class="examples-container">
        <div class="sample">
          <div id="toggle-lights" class="demo"></div>
          <div class="content">
            <div class="wrapper">
              <h4 id="intro">
                <span class="font-medium">LD Lights </span>by
                <a href="https://londondynamics.com" target="_blank"
                  >London Dynamics</a
                >. This page showcases how you can control KHR lights features
              </h4>
              <div class="heading">
                <h2 class="demo-title">
                  The <span class="attribute">lights</span> attribute and the
                  <span class="attribute">toggleLights</span> method allow you
                  to control light objects in the scene
                </h2>
              </div>
              <example-snippet stamp-to="toggle-lights" highlight-as="html">
                <template>
                  <model-viewer
                    id="three-demo"
                    camera-controls
                    interaction-prompt="none"
                    autoplay
                    ar
                    ar-modes="webxr scene-viewer"
                    shadow-intensity="1"
                    src="../../shared-assets/models/lamp.glb"
                    alt="An animated 3D model a bedside lamp"
                    tone-mapping="agx"
                  >
                    <div class="ld-panel">
                      <div class="ld-card">
                        <div class="ld-card-toolbar">
                      <button type="button" id="toggleLights" class="ld-button-sm">Turn ON</button>
                      <button type="button" id="toggleAttribute" class="ld-button-sm">
                        Toggle HTML attribute
                      </button>
                        </div>
                      </div>
                    </div>
                  </model-viewer>

                  <script type="module">
                    (() => {
                      const modelViewer = document.querySelector('#three-demo');

                      let lightsOn = false;

                      const setButtonText = () => {
                        document.getElementById('toggleLights').innerText =
                          lightsOn ? 'Turn OFF' : 'Turn ON';
                      };

                      document
                        .getElementById('toggleLights')
                        .addEventListener('click', (e) => {
                          const state = modelViewer.toggleLights(!lightsOn);
                          lightsOn = state;
                          setButtonText();
                        });

                      document
                        .getElementById('toggleAttribute')
                        .addEventListener('click', (e) => {
                          lightsOn = !lightsOn;

                          if (lightsOn) {
                            modelViewer.setAttribute('lights', 'true');
                          } else {
                            modelViewer.removeAttribute('lights');
                          }

                          setButtonText();
                        });
                    })();
                  </script>
                </template>
              </example-snippet>
            </div>
          </div>
        </div>
        <div class="footer">
          <ul></ul>
          <div style="margin-top: 24px" class="copyright">
            ©Copyright 2019 Google Inc. Licensed under the Apache License 2.0.
          </div>
          <div id="footer-links"></div>
        </div>
      </div>
    </div>

    <script
      type="module"
      src="../../examples/built/docs-and-examples.js"
    ></script>
    <script type="module">
      (() => {
        init('examples-ld_lights');
      })();
      (() => {
        initFooterLinks();
      })();
    </script>

    <!-- Documentation-specific dependencies: -->
    <script type="module" src="../built/dependencies.js"></script>

    <!-- Loads <model-viewer> on modern browsers: -->
    <script
      type="module"
      src="../../node_modules/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </body>
</html>
